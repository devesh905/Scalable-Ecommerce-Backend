version: '3.9'

services:

  api:
    build: .
    container_name: ecommerce-api
    ports:
      - "8081:8080"
    depends_on:
      - redis
      - sqlserver
    environment:
       - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=EcommerceDB;User Id=sa;Password=Your_password123;Encrypt=False;TrustServerCertificate=True
    # environment:
    #   - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=EcommerceDB;User=sa;Password=Your_password123;TrustServerCertificate=True

  redis:
    image: redis:latest
    container_name: ecommerce-redis
    ports:
      - "6379:6379"

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: ecommerce-sql
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=Your_password123
    ports:
      - "1433:1433"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: ecommerce-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"