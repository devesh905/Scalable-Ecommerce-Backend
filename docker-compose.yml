version: '3.9'

services:

  api:
    build: .
    container_name: ecommerce-api
    ports:
      - "5000:80"
    depends_on:
      - redis
      - sqlserver
    environment:
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=EcommerceDB;User=sa;Password=Your_password123;TrustServerCertificate=True

  redis:
    image: redis:latest
    container_name: ecommerce-redis
    ports:
      - "6379:6379"

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: ecommerce-sql
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=Your_password123
    ports:
      - "1433:1433"